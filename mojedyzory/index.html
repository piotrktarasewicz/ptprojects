<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Dyżury</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;padding:1rem;}
.card{border:1px solid #ccc;padding:1rem;border-radius:1rem;}
button,select,a{width:100%;margin-top:0.5rem;padding:0.7rem;}
.error{margin-top:1rem;}
</style>
</head>
<body>

<div class="card">
<h1>Wybór dnia</h1>
<p id="status" aria-live="polite">Wczytywanie…</p>

<label for="sel">Dzień</label>
<select id="sel"></select>
<button id="btn" type="button">Pokaż</button>

<div id="err" class="error" aria-live="assertive"></div>
</div>

<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycbyYg83UTU_gmSqf1FaOxmF7AhKNJ6IJzCq599RWm4g59arFdseElixo8gg_oQExPR2Mqw/exec";
const ACCESS_TOKEN = "Pjetia21Ag7X3t*";

function today(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function friendly(d){
  const [y,m,da]=d.split("-").map(Number);
  return new Intl.DateTimeFormat("pl-PL",{weekday:"long",day:"numeric",month:"long",year:"numeric"})
    .format(new Date(y,m-1,da));
}

function loadSchedule(){
  return new Promise((resolve,reject)=>{
    if(!DATA_URL || DATA_URL==="TU_WKLEJ_ADRES_APPS_SCRIPT_WEB_APP"){
      reject(new Error("Brak adresu Apps Script Web App w pliku index.html."));
      return;
    }

    if(!ACCESS_TOKEN || ACCESS_TOKEN==="ZMIEŃ_TEN_TOKEN_NA_WŁASNY_DŁUGI_TEKST"){
      reject(new Error("Brak ustawionego tokenu dostępu w pliku index.html."));
      return;
    }

    const callbackName="grafikCallback_"+Date.now()+"_"+Math.floor(Math.random()*1000000);
    const script=document.createElement("script");
    const separator=DATA_URL.includes("?")?"&":"?";

    window[callbackName]=(payload)=>{
      cleanup();

      if(!payload || payload.ok!==true){
        reject(new Error(payload && payload.error ? payload.error : "Nie udało się pobrać grafiku."));
        return;
      }

      resolve(Array.isArray(payload.items)?payload.items:[]);
    };

    function cleanup(){
      delete window[callbackName];
      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    script.onerror=()=>{
      cleanup();
      reject(new Error("Błąd połączenia z Apps Script."));
    };

    script.src=DATA_URL+
      separator+
      "token="+encodeURIComponent(ACCESS_TOKEN)+
      "&callback="+encodeURIComponent(callbackName)+
      "&t="+encodeURIComponent(String(Date.now()));

    document.head.appendChild(script);
  });
}

const status=document.getElementById("status");
const sel=document.getElementById("sel");
const btn=document.getElementById("btn");
const err=document.getElementById("err");

btn.onclick=()=>{
  err.textContent="";
  if(!sel.value){
    err.textContent="Wybierz dzień";
    return;
  }

  location.href="results.html?day="+encodeURIComponent(sel.value);
};

loadSchedule()
.then(rows=>{
  const t=today();

  const dates=[...new Set(
    rows
      .filter(r=>(r.status==="work" || r.status==="l4") && r.date>=t)
      .map(r=>r.date)
  )].sort();

  if(!dates.length){
    err.textContent="Brak przyszłych dyżurów.";
    status.textContent="";
    return;
  }

  sel.textContent="";

  dates.forEach(d=>{
    const dayRows=rows.filter(r=>r.date===d && (r.status==="work" || r.status==="l4"));
    const hasL4=dayRows.some(r=>r.status==="l4");
    const o=document.createElement("option");
    o.value=d;
    o.textContent=hasL4 ? `${friendly(d)}, l4` : friendly(d);
    sel.appendChild(o);
  });

  status.textContent="Grafik wczytany.";
})
.catch(e=>{
  status.textContent="";
  err.textContent=e.message;
});
</script>

</body>
</html>
