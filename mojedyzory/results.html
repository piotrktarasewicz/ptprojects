<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Wyniki</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;padding:1rem;}
.card{border:1px solid #ccc;padding:1rem;border-radius:1rem;}
.duty{border:1px solid #ccc;margin-top:0.5rem;padding:0.5rem;}
a{display:block;margin-top:1rem;}
.error{margin-top:1rem;}
</style>
</head>
<body>

<div class="card">
<h1>Wyniki</h1>
<p id="status" aria-live="polite">Wczytywanie…</p>

<div id="list"></div>

<a href="index.html">Wróć do wyboru dnia</a>

<div id="err" class="error" aria-live="assertive"></div>
</div>

<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycbyYg83UTU_gmSqf1FaOxmF7AhKNJ6IJzCq599RWm4g59arFdseElixo8gg_oQExPR2Mqw/exec";
const ACCESS_TOKEN = "Pjetia21Ag7X3t*";

function today(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function friendly(d){
  const [y,m,da]=d.split("-").map(Number);
  return new Intl.DateTimeFormat("pl-PL",{weekday:"long",day:"numeric",month:"long",year:"numeric"})
    .format(new Date(y,m-1,da));
}

function loadSchedule(){
  return new Promise((resolve,reject)=>{
    if(!DATA_URL || DATA_URL==="TU_WKLEJ_ADRES_APPS_SCRIPT_WEB_APP"){
      reject(new Error("Brak adresu Apps Script Web App w pliku results.html."));
      return;
    }

    if(!ACCESS_TOKEN || ACCESS_TOKEN==="ZMIEŃ_TEN_TOKEN_NA_WŁASNY_DŁUGI_TEKST"){
      reject(new Error("Brak ustawionego tokenu dostępu w pliku results.html."));
      return;
    }

    const callbackName="grafikCallback_"+Date.now()+"_"+Math.floor(Math.random()*1000000);
    const script=document.createElement("script");
    const separator=DATA_URL.includes("?")?"&":"?";

    window[callbackName]=(payload)=>{
      cleanup();

      if(!payload || payload.ok!==true){
        reject(new Error(payload && payload.error ? payload.error : "Nie udało się pobrać grafiku."));
        return;
      }

      resolve(Array.isArray(payload.items)?payload.items:[]);
    };

    function cleanup(){
      delete window[callbackName];
      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    script.onerror=()=>{
      cleanup();
      reject(new Error("Błąd połączenia z Apps Script."));
    };

    script.src=DATA_URL+
      separator+
      "token="+encodeURIComponent(ACCESS_TOKEN)+
      "&callback="+encodeURIComponent(callbackName)+
      "&t="+encodeURIComponent(String(Date.now()));

    document.head.appendChild(script);
  });
}

function addDutyLine(text){
  const div=document.createElement("div");
  div.className="duty";
  div.textContent=text;
  list.appendChild(div);
}

const params=new URLSearchParams(location.search);
const day=params.get("day");

const status=document.getElementById("status");
const list=document.getElementById("list");
const err=document.getElementById("err");

if(!day){
  status.textContent="";
  err.textContent="Brak dnia.";
}else if(day<today()){
  status.textContent="";
  err.textContent="Nie można cofnąć.";
}else{
  loadSchedule()
  .then(rows=>{
    const dayRows=rows.filter(r=>r.date===day);

    status.textContent="Grafik wczytany.";

    if(!dayRows.length){
      list.textContent="Brak danych dla dnia: "+friendly(day)+".";
      return;
    }

    const visibleRows=dayRows.filter(r=>r.status==="work" || r.status==="l4");

    if(!visibleRows.length){
      list.textContent="Brak dyżuru.";
      return;
    }

    list.textContent="";

    visibleRows.forEach(row=>{
      if(row.status==="l4"){
        addDutyLine(`${row.title || "l4"}, cały dzień, ${row.location || ""}`.trim());
        return;
      }

      const title=row.title || "Robota";
      const start=row.start || "";
      const end=row.end || "";
      const location=row.location || "";

      addDutyLine(`${title}, ${start}–${end}, ${location}`.trim());
    });
  })
  .catch(e=>{
    status.textContent="";
    err.textContent=e.message;
  });
}
</script>

</body>
</html>
